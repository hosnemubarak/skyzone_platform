server {
    listen 80;
    server_name api.skyzoneintl.com;

    # Redirect HTTP to HTTPS (uncomment after adding SSL)
    # return 301 https://$server_name$request_uri;

    # Limit payload size for form submissions
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files directly via Nginx
    location /static/ {
        # This alias path must point to the absolute path on the VPS host
        # where the django_static docker volume is mounted.
        # e.g., /var/lib/docker/volumes/skyzone_platform_django_static/_data/
        alias /var/lib/docker/volumes/skyzone_platform_django_static/_data/;
        expires 30d;
        access_log off;
    }

    # Serve media files directly via Nginx
    location /media/ {
        # This alias path must point to the absolute path on the VPS host
        # where the django_media docker volume is mounted.
        alias /var/lib/docker/volumes/skyzone_platform_django_media/_data/;
        expires 30d;
        access_log off;
    }
}
