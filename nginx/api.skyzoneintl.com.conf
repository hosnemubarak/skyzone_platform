server {
    listen 80;
    server_name api.skyzoneintl.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.skyzoneintl.com;

    ssl_certificate /etc/letsencrypt/live/api.skyzoneintl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.skyzoneintl.com/privkey.pem;

    # SSL security configurations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Limit payload size for form submissions
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files directly via Nginx
    location /static/ {
        # Point to the bind-mounted host directory
        alias /opt/skyzone_platform/backend/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Serve media files directly via Nginx
    location /media/ {
        # Point to the bind-mounted host directory
        alias /opt/skyzone_platform/backend/media/;
        expires 30d;
        access_log off;
    }
}
