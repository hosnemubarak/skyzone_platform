server {
    listen 80;
    server_name mail.skyzoneintl.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mail.skyzoneintl.com;
    
    ssl_certificate /etc/letsencrypt/live/mail.skyzoneintl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.skyzoneintl.com/privkey.pem;

    # SSL security configurations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        # Proxy Poste.io Web UI & Admin Panel
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
