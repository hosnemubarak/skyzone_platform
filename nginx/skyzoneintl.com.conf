server {
    listen 80;
    server_name skyzoneintl.com www.skyzoneintl.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name skyzoneintl.com www.skyzoneintl.com;
    
    ssl_certificate /etc/letsencrypt/live/skyzoneintl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skyzoneintl.com/privkey.pem;

    # SSL security configurations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";
    }

    # Static assets caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        access_log off;
    }
}
